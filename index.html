<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundSage Botswana</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- HEADER -->
    <header>
        <h1>SoundSage Botswana</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">Products</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <!-- HERO -->
    <section class="hero">
        <h2>Premium Car Audio Solutions</h2>
        <p>Subwoofers • Amplifiers • Sound Systems</p>
        <button>Shop Now</button>
    </section>

    <!-- CONTACT SECTION -->
    <section class="contact">
    <h2>Contact Info</h2>

    <div class="contact-item" onclick="sendEmail()">
        <span>📧</span>
        <p>soundsageaudiobw@gmail.com</p>
    </div>

    <div class="contact-item" onclick="makeCall()">
        <span>📞</span>
        <p>+267 77 730 365</p>
    </div>

    <div class="contact-item" onclick="openWhatsApp()">
        <span>💬</span>
        <p>Chat on WhatsApp</p>
    </div>

    <div class="contact-item" onclick="openFacebook()">
        <span>📘</span>
        <p>Sound Sage Botswana</p>
    </div>
</section>

<!-- LINK JS -->
<script src="script.js"></script>

    <!-- FOOTER -->
    <footer>
        <p>© 2026 SoundSage Botswana | Built for Premium Sound</p>
    </footer>

</body>
          </html>
